<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>worst ai ever</title>
  <script>
    // Security: Frame-busting (prevent clickjacking)
    // NOTE: Commented out because it breaks the sandboxed preview canvas.
    // Uncomment this block when you deploy to your actual website!
    /*
    if (window.top !== window.self) {
      window.top.location.replace(window.self.location.href);
    }
    */

    // Security: Basic anti-inspect & anti-right click
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.addEventListener('keydown', event => {
      // Block F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C, Ctrl+U
      if (event.key === 'F12' || 
         (event.ctrlKey && event.shiftKey && ['I', 'J', 'C', 'i', 'j', 'c'].includes(event.key)) || 
         (event.ctrlKey && (event.key === 'U' || event.key === 'u'))) {
          event.preventDefault();
      }
    });
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body, html {
      height: 100%;
      background-color: #030305;
      font-family: 'Inter', sans-serif;
      color: #e2e8f0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #core-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
    }

    .ui-layer {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 650px;
      height: 85vh;
      background: rgba(15, 15, 20, 0.4);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .screen {
      flex: 1;
      display: none;
      flex-direction: column;
      height: 100%;
    }

    /* main menu / dashboard */
    #main-menu {
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 40px;
      overflow-y: auto;
    }

    h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.5rem;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .desc { font-size: 1.05rem; margin-bottom: 30px; color: #94a3b8; line-height: 1.5; max-width: 80%; }

    .glow-btn {
      background: rgba(255, 255, 255, 0.03);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      padding: 14px 32px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      margin-top: 15px;
    }

    .glow-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(236, 72, 153, 0.2));
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: -1;
    }

    .glow-btn:hover { border-color: rgba(255, 255, 255, 0.3); box-shadow: 0 0 20px rgba(168, 85, 247, 0.2); }
    .glow-btn:hover::before { opacity: 1; }
    .glow-btn:active { transform: scale(0.97); }

    #dashboard-section {
      width: 100%;
      max-width: 400px;
      background: rgba(0, 0, 0, 0.2);
      padding: 30px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .dash-stat {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.2rem;
      color: #c084fc;
      background: rgba(192, 132, 252, 0.1);
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(192, 132, 252, 0.2);
    }

    .settings-group { display: flex; flex-direction: column; gap: 10px; text-align: left; }
    .settings-group label { font-size: 0.9rem; color: #cbd5e1; display: flex; justify-content: space-between; }
    
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 16px; width: 16px;
      border-radius: 50%;
      background: #a855f7;
      cursor: pointer;
      margin-top: -6px;
      box-shadow: 0 0 10px rgba(168, 85, 247, 0.5);
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%; height: 4px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }

    .text-link { font-size: 0.85rem; color: #64748b; cursor: pointer; transition: color 0.2s; margin-top: 15px; }
    .text-link:hover { color: #ef4444; }

    /* chat screen */
    #header {
      padding: 16px 24px;
      background: rgba(0, 0, 0, 0.2);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    select {
      background: rgba(0, 0, 0, 0.3);
      color: #e2e8f0;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      outline: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
    }
    select option { background: #0f0f14; color: #fff; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

    .msg {
      padding: 14px 18px;
      border-radius: 18px;
      max-width: 85%;
      line-height: 1.5;
      font-size: 0.95rem;
      word-wrap: break-word;
      animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .user {
      align-self: flex-end;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #f8fafc;
      border-bottom-right-radius: 4px;
    }

    .ai {
      align-self: flex-start;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.1), rgba(236, 72, 153, 0.1));
      border: 1px solid rgba(236, 72, 153, 0.2);
      color: #f8fafc;
      border-bottom-left-radius: 4px;
      box-shadow: 0 4px 20px rgba(168, 85, 247, 0.05);
    }

    .loading { 
      font-family: 'JetBrains Mono', monospace;
      color: #a855f7;
      background: transparent;
      border: none;
      box-shadow: none;
    }

    #input-area {
      display: flex;
      padding: 20px 24px;
      background: rgba(0, 0, 0, 0.2);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      gap: 12px;
    }

    input.chat-input {
      flex: 1;
      padding: 14px 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      font-size: 1rem;
      outline: none;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    input.chat-input:focus { border-color: rgba(168, 85, 247, 0.5); box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.1); }
    input.chat-input::placeholder { color: #475569; }

    button.send-btn {
      background: #e2e8f0;
      color: #0f0f14;
      border: none;
      border-radius: 12px;
      padding: 0 24px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    button.send-btn:hover { background: #fff; transform: translateY(-1px); }
    button.send-btn:active { transform: translateY(1px); }

  </style>
</head>
<body>

  <canvas id="core-canvas"></canvas>

  <div class="ui-layer">
    
    <!-- main menu / dashboard -->
    <div id="main-menu" class="screen">
      <h1>worst ai ever</h1>
      <p class="desc">this app uses pollinations to intentionally generate the most broken, useless, and unhelpful responses possible. connect your account to suffer.</p>
      
      <!-- shows when not logged in -->
      <div id="auth-section">
        <button class="glow-btn" id="login-btn">authenticate</button>
      </div>
    </div>

    <!-- chat UI -->
    <div id="chat-screen" class="screen">
      <div id="header">
        <div class="dash-stat" style="font-size: 0.9rem; padding: 6px 12px;">pollen: <span id="menu-balance">...</span></div>
        <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
          <select id="model-select"><option value="">loading...</option></select>
          <span class="text-link" id="menu-logout-btn" style="margin: 0;">disconnect</span>
        </div>
      </div>
      <div id="messages"></div>
      <div id="input-area">
        <input type="text" id="user-input" class="chat-input" placeholder="initiate terrible response..." autocomplete="off">
        <button id="send-btn" class="send-btn">send</button>
      </div>
    </div>

  </div>

  <script>
    // --- particle system ---
    const canvas = document.getElementById('core-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, center = { x: 0, y: 0 };
    let particles = [];
    let isGenerating = false;

    function initCanvas() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      center.x = width / 2;
      center.y = height / 2;
    }
    window.addEventListener('resize', initCanvas);
    initCanvas();

    class Particle {
      constructor() {
        this.angle = Math.random() * Math.PI * 2;
        this.baseRadius = Math.random() * (Math.min(width, height) * 0.4) + 100;
        this.radius = this.baseRadius;
        this.baseSpeed = (Math.random() - 0.5) * 0.005 + 0.001;
        this.size = Math.random() * 2.5 + 0.5;
        this.hue = Math.random() * 60 + 260; 
      }
      update() {
        const targetRadius = isGenerating ? Math.random() * 40 + 10 : this.baseRadius;
        const targetSpeed = isGenerating ? this.baseSpeed * 15 : this.baseSpeed;
        this.radius += (targetRadius - this.radius) * 0.05;
        this.angle += targetSpeed;
        this.x = center.x + Math.cos(this.angle) * this.radius;
        this.y = center.y + Math.sin(this.angle) * this.radius;
      }
      draw() {
        const opacity = isGenerating ? 0.8 : 0.3;
        ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, ${opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (let i = 0; i < 200; i++) particles.push(new Particle());

    function animate() {
      ctx.fillStyle = 'rgba(3, 3, 5, 0.1)';
      ctx.fillRect(0, 0, width, height);
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }
    animate();

    // --- app logic ---
    const appKey = 'pk_Vc0368ODtJglaGEU';
    
    // UI elements
    const mainMenu = document.getElementById('main-menu');
    const authSection = document.getElementById('auth-section');
    const chatScreen = document.getElementById('chat-screen');
    const menuBalance = document.getElementById('menu-balance');
    const modelSelect = document.getElementById('model-select');
    const msgs = document.getElementById('messages');
    const input = document.getElementById('user-input');

    // check hash for auth redirect
    const hashParams = new URLSearchParams(window.location.hash.slice(1));
    if (hashParams.has('api_key')) {
      try {
        localStorage.setItem('polli_key', hashParams.get('api_key'));
      } catch (e) {}
      history.replaceState(null, '', window.location.href.split('#')[0]);
    }

    let apiKey = null;
    try {
      apiKey = localStorage.getItem('polli_key');
    } catch (e) {}

    // show right view on load
    if (apiKey) {
      mainMenu.style.display = 'none';
      chatScreen.style.display = 'flex';
      fetchDashboardData();
    } else {
      mainMenu.style.display = 'flex';
      chatScreen.style.display = 'none';
    }

    document.getElementById('login-btn').addEventListener('click', () => {
      const redirectUri = encodeURIComponent(window.location.href.split('#')[0]);
      window.location.href = `https://enter.pollinations.ai/authorize?redirect_uri=${redirectUri}&client_id=${appKey}`;
    });

    const disconnect = () => {
      try {
        localStorage.removeItem('polli_key');
      } catch (e) {}
      location.reload();
    };

    document.getElementById('menu-logout-btn').addEventListener('click', disconnect);

    async function fetchDashboardData() {
      // get balance
      try {
        const res = await fetch('https://gen.pollinations.ai/account/balance', {
          headers: { 'Authorization': `Bearer ${apiKey}` }
        });
        menuBalance.textContent = res.ok ? await res.text() : 'error';
      } catch {
        menuBalance.textContent = 'error';
      }

      // get models if not loaded
      if (modelSelect.children.length <= 1) {
        try {
          const res = await fetch('https://gen.pollinations.ai/text/models');
          const models = await res.json();
          modelSelect.innerHTML = '';
          models.forEach(m => {
            const opt = document.createElement('option');
            const val = m.name || m.id || m;
            opt.value = val;
            opt.textContent = val;
            modelSelect.appendChild(opt);
          });
        } catch {
          modelSelect.innerHTML = '<option value="openai">openai</option>';
        }
      }
    }

    const addMsg = (text, sender) => {
      const div = document.createElement('div');
      div.className = `msg ${sender}`;
      div.textContent = text;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      return div;
    };

    const typeText = async (element, text) => {
      element.textContent = '';
      for(let i = 0; i < text.length; i++) {
        element.textContent += text.charAt(i);
        await new Promise(r => setTimeout(r, 10));
      }
    }

    const send = async () => {
      const text = input.value.trim();
      if (!text) return;
      
      input.value = '';
      addMsg(text, 'user');
      const loading = addMsg('> processing...', 'ai loading');
      
      isGenerating = true;
      
      try {
        const model = modelSelect.value;
        const prompt = `act like a broken, unhelpful, terrible ai. give a completely unrelated, useless answer, or absolute nonsense. user says: ${text}`;
        
        const res = await fetch(`https://gen.pollinations.ai/text/${encodeURIComponent(prompt)}?model=${model}`, {
          headers: { 'Authorization': `Bearer ${apiKey}` }
        });
        
        if (!res.ok) throw new Error('fail');
        const reply = await res.text();
        
        loading.classList.remove('loading');
        await typeText(loading, reply || '...');
        
      } catch (err) {
        loading.classList.remove('loading');
        loading.textContent = 'system failure.';
      } finally {
        isGenerating = false;
      }
    };

    document.getElementById('send-btn').addEventListener('click', send);
    input.addEventListener('keypress', (e) => e.key === 'Enter' && send());
  </script>
</body>
</html>
