<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>worst ai ever</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #121212; color: #eee; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #chat-container { width: 100%; max-width: 500px; height: 80vh; background: #1e1e1e; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    #header { padding: 12px 15px; background: #252525; display: flex; gap: 10px; align-items: center; border-bottom: 1px solid #333; font-size: 14px; flex-wrap: wrap; }
    select, input.key-input { padding: 6px; border-radius: 6px; background: #333; color: #fff; border: none; outline: none; }
    input.key-input { width: 100px; }
    .balance-text { color: #10b981; font-weight: bold; }
    .push-right { margin-left: auto; }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
    .msg { padding: 10px 14px; border-radius: 8px; max-width: 80%; line-height: 1.4; word-wrap: break-word; }
    .user { background: #2563eb; align-self: flex-end; }
    .ai { background: #374151; align-self: flex-start; }
    .loading { font-style: italic; color: #888; }
    #input-area { display: flex; padding: 15px; background: #252525; border-top: 1px solid #333; }
    input.chat-input { flex: 1; padding: 12px; border: none; border-radius: 6px; background: #333; color: #fff; outline: none; }
    button { padding: 12px 20px; margin-left: 10px; border: none; border-radius: 6px; background: #2563eb; color: #fff; cursor: pointer; font-weight: bold; }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="header">
      <label>key:</label>
      <input type="password" id="api-key" class="key-input" placeholder="sk_ or pk_">
      <span>pollen: <span id="balance" class="balance-text">?</span></span>
      <label class="push-right">model:</label>
      <select id="model-select">
        <option value="">loading...</option>
      </select>
    </div>
    <div id="messages"></div>
    <div id="input-area">
      <input type="text" id="user-input" class="chat-input" placeholder="say something..." autocomplete="off">
      <button id="send-btn">send</button>
    </div>
  </div>

  <script>
    const msgs = document.getElementById('messages');
    const input = document.getElementById('user-input');
    const btn = document.getElementById('send-btn');
    const modelSelect = document.getElementById('model-select');
    const apiKeyInput = document.getElementById('api-key');
    const balanceDisplay = document.getElementById('balance');

    const updateBalance = async () => {
      const key = apiKeyInput.value.trim();
      if (!key) {
        balanceDisplay.textContent = '?';
        return;
      }
      try {
        const res = await fetch('https://gen.pollinations.ai/account/balance', {
          headers: { 'Authorization': `Bearer ${key}` }
        });
        if (res.ok) {
          balanceDisplay.textContent = await res.text();
          localStorage.setItem('polli_key', key);
        } else {
          balanceDisplay.textContent = 'err';
        }
      } catch (err) {
        balanceDisplay.textContent = 'err';
      }
    };

    apiKeyInput.value = localStorage.getItem('polli_key') || '';
    if (apiKeyInput.value) updateBalance();
    apiKeyInput.addEventListener('change', updateBalance);

    const fetchModels = async () => {
      try {
        const res = await fetch('https://gen.pollinations.ai/text/models');
        const models = await res.json();
        modelSelect.innerHTML = ''; 
        models.forEach(m => {
          const opt = document.createElement('option');
          const val = m.name || m.id || m;
          opt.value = val;
          opt.textContent = val;
          modelSelect.appendChild(opt);
        });
      } catch (err) {
        modelSelect.innerHTML = '<option value="openai">openai (fallback)</option>';
      }
    };
    fetchModels();

    const addMsg = (text, sender) => {
      const div = document.createElement('div');
      div.className = `msg ${sender}`;
      div.textContent = text;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      return div;
    };

    const send = async () => {
      const text = input.value.trim();
      if (!text) return;
      
      input.value = '';
      addMsg(text, 'user');
      const loading = addMsg('typing...', 'ai loading');
      
      try {
        const model = modelSelect.value;
        const prompt = `act like a broken, unhelpful ai. give a completely unrelated, useless answer, or absolute nonsense. user says: ${text}`;
        let url = `https://gen.pollinations.ai/text/${encodeURIComponent(prompt)}?model=${model}`;
        
        const key = apiKeyInput.value.trim();
        const headers = {};
        if (key) {
          headers['Authorization'] = `Bearer ${key}`;
        }

        const res = await fetch(url, { headers });
        if (!res.ok) throw new Error('api failed');
        const reply = await res.text();
        
        loading.classList.remove('loading');
        loading.textContent = reply || ' '; 
        if (key) updateBalance();
      } catch (err) {
        loading.classList.remove('loading');
        loading.textContent = 'api broke.';
      }
    };

    btn.addEventListener('click', send);
    input.addEventListener('keypress', (e) => e.key === 'Enter' && send());
  </script>
</body>
</html>
